name: Deploy to GitHub Pages

on:
  # 觸發條件：當推送到 main 分支時 (如果你的預設分支是 master，請將這裡改為 master)
  push:
    branches: ["main"]

# 設定 GitHub Token 權限以允許部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許只有一個併發部署，跳過執行中的任務並取消排隊中的任務
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # Vite 預設打包輸出的資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
